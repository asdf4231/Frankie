# Nemsy 项目配置
# 敏感信息（API Key 等）通过 .env 文件或环境变量传入，不写在这里

[app]
name = "Nemsy"
version = "0.1.0"
# 角色描述，未来人格化阶段扩展
persona = "Nemsy Necrofizzle"

[vault]
# Obsidian Vault 根目录
# 可被环境变量 NEMSY_VAULT_PATH 覆盖
path = "/Users/ppp/Library/CloudStorage/OneDrive-个人/文档/Obsidian Vault"
# 忽略的目录（不纳入索引）
ignore_dirs = [".obsidian", ".trash", ".DS_Store"]
# 支持的文件扩展名
include_extensions = [".md"]

[llm]
# DeepSeek API（OpenAI 兼容）
base_url = "https://api.deepseek.com"
# 模型选择：deepseek-chat（快速）或 deepseek-reasoner（深度推理）
default_model = "deepseek-chat"
# 超长上下文场景用 reasoner
reasoning_model = "deepseek-reasoner"
# 单次请求最大 token（DeepSeek 支持 128k context）
max_tokens = 8192
temperature = 0.7

[memory]
# 对话历史保存路径（相对于项目根目录）
history_dir = ".nemsy/history"
# 最多保留的对话轮数（0 = 不限）
max_turns = 0
# 知识摘要缓存
summary_cache_dir = ".nemsy/cache"

[cli]
# CLI 输出主题色（rich 颜色名）
theme_color = "cyan"
# 每次启动显示欢迎语
show_welcome = true
