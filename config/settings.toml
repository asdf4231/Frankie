# Nemsy 项目配置
# 规则：所有配置都在这里；只有 DEEPSEEK_API_KEY 放在 .env 中

[app]
name = "Nemsy"
version = "0.1.0"
persona = "Nemsy Necrofizzle"

[vault]
# Obsidian Vault 根目录（你的个人 Vault）
path = "/Users/ppp/Library/CloudStorage/OneDrive-个人/文档/Obsidian Vault"
# Wiki 子目录名（位于 Vault 内，由 Nemsy 负责写）
wiki_dir = "nemsy-wiki"
# 原始资料子目录（位于 Vault 内，整理好后填入，留空=未配置）
raw_sources_dir = "origin-sources"
# 索引时跳过的目录
ignore_dirs = [".obsidian", ".trash", ".DS_Store", "nemsy-wiki", "origin-sources"]
# 纳入索引的扩展名
include_extensions = [".md"]

[llm]
base_url = "https://api.deepseek.com"
# deepseek-v4-flash：日常对话（快速，非思考模式）
# deepseek-v4-pro：深度推理（思考模式，原 deepseek-reasoner）
# 注：deepseek-chat / deepseek-reasoner 将于 2026-07-24 弃用
default_model = "deepseek-v4-flash"
reasoning_model = "deepseek-v4-pro"
max_tokens = 8192
temperature = 0.7

[memory]
history_dir = ".nemsy/history"
max_turns = 0
summary_cache_dir = ".nemsy/cache"

[cli]
theme_color = "cyan"
show_welcome = true
